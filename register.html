<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar - Viral</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#1976d2;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.box{
background:white;
width:380px;
padding:30px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#1976d2;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
}

a{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="box">

<h2>Daftar Akun</h2>

<input type="text" placeholder="Nama Lengkap">

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<select>

<option>Creator</option>

<option>Brand</option>

</select>

<button>Daftar Sekarang</button>

<a href="login.html">Sudah punya akun?</a>

<a href="index.html">Kembali ke Home</a>

</div>

</body>
  </html>
