<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar - Viral Platform</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{
background:#f4f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:100%;
max-width:430px;
background:#fff;
padding:35px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.logo{
text-align:center;
font-size:34px;
font-weight:bold;
color:#1565c0;
margin-bottom:10px;
}

h2{
text-align:center;
margin-bottom:8px;
}

.sub{
text-align:center;
color:#666;
margin-bottom:30px;
}

.input{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:18px;
font-size:15px;
outline:none;
transition:.3s;
}

.input:focus{
border-color:#1565c0;
box-shadow:0 0 5px rgba(21,101,192,.3);
}

select{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:20px;
font-size:15px;
}

button{
width:100%;
padding:15px;
background:#1565c0;
color:white;
border:none;
border-radius:10px;
font-size:17px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#0d47a1;
}

.login{
margin-top:20px;
text-align:center;
}

.login a{
text-decoration:none;
color:#1565c0;
font-weight:bold;
}

.error{
margin-top:15px;
color:red;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
Viral
</div>

<h2>Buat Akun Baru</h2>

<p class="sub">
Gabung sebagai Creator atau Brand
</p>

<input
type="text"
id="nama"
class="input"
placeholder="Nama Lengkap">

<input
type="email"
id="email"
class="input"
placeholder="Email">

<input
type="password"
id="password"
class="input"
placeholder="Password">

<select id="role">

<option value="creator">
Creator
</option>

<option value="brand">
Brand
</option>

</select>

<button onclick="register()">
Daftar Sekarang
</button>

<div class="login">
Sudah punya akun?
<a href="login.html">
Login
</a>
</div>

<p id="pesan" class="error"></p>

</div>

<script type="module" src="auth.js"></script>

</body>
</html>
