<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun Baru - Firebase</title>
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Beranda</a> | <a href="join.html">Gabung</a> | <a href="register.html"><b>Daftar</b></a> | <a href="login.html">Login</a>
        </nav>
    </header>

    <main>
        <h1>Formulir Registrasi Firebase</h1>
        <form id="registerForm">
            <label for="email">Email:</label><br>
            <input type="email" id="email" required><br><br>

            <label for="password">Kata Sandi:</label><br>
            <input type="password" id="password" required><br><br>

            <button type="submit" id="btnDaftar">Daftar Akun</button>
        </form>
    </main>

    <!-- Memanggil SDK Firebase Auth secara Online -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, createUserWithEmailAndPassword, sendEmailVerification } from "https://gstatic.com";

        // ⚠️ GANTI DENGAN KODE KONFIGURASI YANG ANDA SALIN DARI CONSOLE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "://firebaseapp.com",
            projectId: "proyek-anda",
            storageBucket: "://appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456:web:abcde"
        };

        // Inisialisasi Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Logika Pendaftaran
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnDaftar');

            btn.innerText = "Mendaftarkan...";
            btn.disabled = true;

            // 1. Membuat akun baru di Firebase secara otomatis
            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // 2. Jika akun berhasil dibuat, otomatis kirim email verifikasi resmi dari Google
                    sendEmailVerification(auth.currentUser)
                        .then(() => {
                            alert("Pendaftaran sukses! Google Firebase telah mengirimkan link verifikasi ke email: " + email + ". Silakan klik link di email Anda sebelum melakukan login.");
                            window.location.href = "login.html";
                        });
                })
                .catch((error) => {
                    alert("Gagal mendaftar: " + error.message);
                    btn.innerText = "Daftar Akun";
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
