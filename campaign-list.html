<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campaign</title>

<style>

body{
font-family:Arial;
background:#eef3f8;
margin:0;
}

.container{

width:90%;
max-width:1200px;

margin:auto;

padding:30px;

}

h1{

color:#1565c0;

margin-bottom:25px;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(320px,1fr));

gap:20px;

}

.card{

background:white;

padding:20px;

border-radius:12px;

box-shadow:0 2px 10px rgba(0,0,0,.15);

}

.card h2{

color:#1565c0;

margin-bottom:10px;

}

button{

margin-top:20px;

width:100%;

padding:12px;

background:#1565c0;

border:none;

color:white;

border-radius:8px;

cursor:pointer;

}

button:hover{

background:#0d47a1;

}

</style>

</head>

<body>

<div class="container">

<h1>Daftar Campaign</h1>

<div id="campaignList" class="grid">

</div>

</div>

<script type="module" src="campaign-list.js"></script>

</body>

</html>
