<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Creator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f6fb;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:230px;
height:100%;
background:#1976d2;
padding:20px;
color:white;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:12px;
margin-bottom:10px;
background:rgba(255,255,255,.15);
color:white;
text-decoration:none;
border-radius:8px;
}

.main{
margin-left:250px;
padding:25px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.card-area{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h3{
margin-bottom:10px;
color:#1976d2;
}

table{
width:100%;
margin-top:30px;
background:white;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
}

table th{
background:#1976d2;
color:white;
padding:15px;
}

table td{
padding:15px;
border-bottom:1px solid #ddd;
text-align:center;
}

.btn{
display:inline-block;
padding:10px 20px;
background:#1976d2;
color:white;
text-decoration:none;
border-radius:8px;
}

@media(max-width:768px){

.sidebar{
position:relative;
width:100%;
height:auto;
}

.main{
margin-left:0;
}

}

</style>

</head>

<body>

<div class="sidebar">

<h2>Viral</h2>

<a href="index.html">🏠 Home</a>

<a href="#">📢 Campaign</a>

<a href="#">📤 Upload Konten</a>

<a href="#">💰 Wallet</a>

<a href="#">👤 Profil</a>

<a href="login.html">🚪 Logout</a>

</div>

<div class="main">

<div class="header">

<h1>Dashboard Creator</h1>

<a class="btn" href="#">Upload Video</a>

</div>

<div class="card-area">

<div class="card">
<h3>Saldo</h3>
<h2>Rp0</h2>
</div>

<div class="card">
<h3>Campaign Aktif</h3>
<h2>0</h2>
</div>

<div class="card">
<h3>Video Disetujui</h3>
<h2>0</h2>
</div>

<div class="card">
<h3>Total Pendapatan</h3>
<h2>Rp0</h2>
</div>

</div>

<table>

<tr>

<th>Campaign</th>

<th>Status</th>

<th>Reward</th>

</tr>

<tr>

<td>Belum ada campaign</td>

<td>-</td>

<td>-</td>

</tr>

</table>

</div>

</body>
</html>
