<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Viral</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#1976d2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
width:350px;
padding:30px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#1976d2;
color:white;
border:none;
border-radius:8px;
font-size:16px;
}

a{
display:block;
margin-top:15px;
text-align:center;
text-decoration:none;
}

</style>

</head>

<body>

<div class="box">

<h2>Login Creator</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Masuk</button>

<a href="register.html">Belum punya akun?</a>

<a href="index.html">Kembali ke Home</a>

</div>

</body>
  </html>
