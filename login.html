<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Login Viral</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#1565c0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:360px;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.3);
}

h2{
text-align:center;
margin-bottom:25px;
}

input{

width:100%;

padding:12px;

margin:10px 0;

border:1px solid #ddd;

border-radius:8px;

}

button{

width:100%;

padding:12px;

background:#1565c0;

color:white;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

}

a{

display:block;

margin-top:15px;

text-align:center;

text-decoration:none;

}

</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<input
id="email"
type="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button onclick="loginUser()">

Masuk

</button>

<a href="register.html">

Belum punya akun?

</a>

</div>

<script type="module" src="auth.js"></script>

</body>

</html>
