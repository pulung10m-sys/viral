<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buat Campaign</title>

<style>

body{

font-family:Arial;

background:#f5f7fb;

margin:0;

}

.container{

max-width:700px;

margin:40px auto;

background:white;

padding:30px;

border-radius:12px;

box-shadow:0 2px 10px rgba(0,0,0,.15);

}

h2{

color:#1565c0;

margin-bottom:25px;

}

label{

display:block;

margin-top:15px;

font-weight:bold;

}

input,
select,
textarea{

width:100%;

padding:12px;

margin-top:8px;

border:1px solid #ccc;

border-radius:8px;

box-sizing:border-box;

}

textarea{

height:140px;

}

button{

margin-top:25px;

width:100%;

padding:14px;

background:#1565c0;

color:white;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

}

button:hover{

background:#0d47a1;

}

</style>

</head>

<body>

<div class="container">

<h2>Buat Campaign Baru</h2>

<form id="campaignForm">

<label>Judul Campaign</label>

<input
id="judul"
type="text">

<label>Reward (Rp)</label>

<input
id="reward"
type="number">

<label>Kategori</label>

<select id="kategori">

<option value="">Pilih</option>

<option>Skincare</option>

<option>Fashion</option>

<option>Makanan</option>

<option>Elektronik</option>

<option>Aplikasi</option>

<option>Lainnya</option>

</select>

<label>Kuota Creator</label>

<input
id="kuota"
type="number">

<label>Deadline</label>

<input
id="deadline"
type="date">

<label>Deskripsi</label>

<textarea
id="deskripsi"></textarea>

<button
type="button"
onclick="simpanCampaign()">

Simpan Campaign

</button>

</form>

</div>

<script type="module" src="campaign.js"></script>

</body>

</html>
