<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaign - Viral</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f6fb;
}

header{
background:#1976d2;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
padding:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.card h3{
margin-bottom:10px;
}

.reward{
color:#1976d2;
font-size:22px;
font-weight:bold;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:#1976d2;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

footer{
margin-top:40px;
padding:20px;
background:#222;
color:white;
text-align:center;
}

</style>

</head>

<body>

<header>

<h1>Campaign Tersedia</h1>

<p>Pilih campaign dan mulai menghasilkan uang.</p>

</header>

<div class="container">

<div class="grid">

<div class="card">

<img src="https://picsum.photos/500/300?1">

<div class="card-content">

<h3>Review Produk Skincare</h3>

<p>Buat video maksimal 60 detik.</p>

<div class="reward">

Rp150.000

</div>

<button>Gabung Campaign</button>

</div>

</div>

<div class="card">

<img src="https://picsum.photos/500/300?2">

<div class="card-content">

<h3>Promosi Aplikasi</h3>

<p>Upload ke TikTok minimal 1000 view.</p>

<div class="reward">

Rp250.000

</div>

<button>Gabung Campaign</button>

</div>

</div>

<div class="card">

<img src="https://picsum.photos/500/300?3">

<div class="card-content">

<h3>Review Makanan</h3>

<p>Konten bebas dan kreatif.</p>

<div class="reward">

Rp300.000

</div>

<button>Gabung Campaign</button>

</div>

</div>

</div>

</div>

<footer>

©2026 Viral Platform

</footer>

</body>

</html>
